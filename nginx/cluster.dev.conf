# Round-robin load balancer for the local dev cluster (docker-compose.cluster.dev.yml) - lets
# the console and any S3 client hit a single URL and actually exercise cross-node distribution
# (routing, forwarding, quorum writes) instead of always landing on the same node. Any node can
# serve any request, so plain round robin needs no session affinity/stickiness.
upstream alarik_cluster {
    server alarik-1:8080;
    server alarik-2:8080;
    server alarik-3:8080;
    server alarik-4:8080;
}

server {
    listen 80;

    # S3 object uploads/downloads can be arbitrarily large - this is a dev/test load balancer
    # for exercising real cluster distribution, not a place to impose an artificial size cap.
    client_max_body_size 0;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://alarik_cluster;

        # SigV4 signs the exact Host header the client sent - forwarding anything else (nginx's
        # own default is the upstream's host:port, not the client's) would break signature
        # verification on whichever backend this round-robins to. Same reasoning
        # ClusterForwardingClient's own inter-node forwarding already relies on.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
