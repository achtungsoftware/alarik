# Test workflow
name: Swift

on:
  push:
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v4
    - name: Swift version
      run: swift --version
    - name: Run tests
      working-directory: alarik
      run: swift test --no-parallel