apiVersion: v2
name: alarik
description: |
  Alarik - S3-compatible object storage with erasure coding and a self-hosted control plane.
  Deploys as a StatefulSet with no external database: users, buckets, access keys, policies and
  cluster membership all live in Alarik's own erasure-coded store alongside object data.
type: application
version: 0.1.0
appVersion: "1.0.0-beta-8"
home: https://github.com/achtungsoftware/alarik
sources:
  - https://github.com/achtungsoftware/alarik
keywords:
  - s3
  - object-storage
  - erasure-coding
  - storage
maintainers:
