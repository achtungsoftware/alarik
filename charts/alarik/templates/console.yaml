{{- if .Values.console.enabled }}
{{/*
The console is a stateless web UI that talks to the S3 API over HTTP like any other client, so it
is a plain Deployment - no volumes, no identity, freely rescheduled.

NUXT_PUBLIC_* values are read by the browser, not the pod, so they must be URLs a user's browser
can reach (your Ingress hostnames) - NOT in-cluster Service DNS, which resolves to nothing outside
the cluster.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alarik.fullname" . }}-console
  labels:
    {{- include "alarik.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.console.replicaCount }}
  selector:
    matchLabels:
      {{- include "alarik.console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alarik.console.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: console
          image: "{{ .Values.console.image.repository }}:{{ .Values.console.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NUXT_PUBLIC_API_BASE_URL
              value: {{ .Values.config.apiBaseUrl | quote }}
            - name: NUXT_PUBLIC_CONSOLE_BASE_URL
              value: {{ .Values.config.consoleBaseUrl | quote }}
            - name: NUXT_PUBLIC_ALLOW_ACCOUNT_CREATION
              value: {{ .Values.config.allowAccountCreation | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alarik.fullname" . }}-console
  labels:
    {{- include "alarik.labels" . | nindent 4 }}
spec:
  type: {{ .Values.console.service.type }}
  selector:
    {{- include "alarik.console.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.console.service.port }}
      targetPort: http
      protocol: TCP
{{- if .Values.console.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alarik.fullname" . }}-console
  labels:
    {{- include "alarik.labels" . | nindent 4 }}
  {{- with .Values.console.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.console.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.console.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.console.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "alarik.fullname" $ }}-console
                port:
                  number: {{ $.Values.console.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
