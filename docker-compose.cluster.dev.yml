services:
  alarik-build:
    build:
      context: ./alarik
      dockerfile: Dockerfile.dev
    image: alarik-cluster-dev:latest
    container_name: alarik-cluster-dev-build
    command: ["swift", "build"]
    volumes:
      - ./alarik:/app
      - alarik-build:/app/.build


  alarik-1:
    image: alarik-cluster-dev:latest
    container_name: alarik-cluster-dev-1
    restart: unless-stopped
    command: [".build/debug/Alarik", "serve", "--env", "development", "--hostname", "0.0.0.0", "--port", "8080"]
    ports:
      - "8081:8080"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # The load balancer's URL, not this node's own port - every node advertises the same
      # externally-reachable address (used for shared-link URLs, OIDC callbacks, etc.) so a link
      # generated by any node round-robins across the whole cluster when followed, the same as it
      # would behind a real load balancer in production. Distinct from CLUSTER_NODE_ADDRESS below,
      # which stays this node's own internal address - that's how peers reach THIS node directly.
      - API_BASE_URL=http://localhost:8080
      - CONSOLE_BASE_URL=http://localhost:3000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-alarik}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-alarik}
      - JWT=dev-cluster-jwt-secret
      - CLUSTER_NODE_ADDRESS=http://alarik-1:8080
      - CLUSTER_SECRET=dev-cluster-secret
      # Erasure coding sized for this 4-node dev cluster: k=2 data + m=2 parity shards (one shard
      # per node). The default is 4+2, which needs 6 nodes and would fail every write here - a
      # cluster must have at least k+m active nodes to accept writes. Tolerates losing any 2 nodes.
      - CLUSTER_EC_DATA_SHARDS=2
      - CLUSTER_EC_PARITY_SHARDS=2
      # Providing default keys is optional but necessary for testing
      - DEFAULT_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
      - DEFAULT_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    volumes:
      - ./alarik:/app
      - alarik-build:/app/.build:ro
      - alarik-1-storage:/app/Storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      alarik-build:
        condition: service_completed_successfully
    networks:
      - alarik-network

  alarik-2:
    image: alarik-cluster-dev:latest
    container_name: alarik-cluster-dev-2
    restart: unless-stopped
    command: [".build/debug/Alarik", "serve", "--env", "development", "--hostname", "0.0.0.0", "--port", "8080"]
    ports:
      - "8082:8080"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # See alarik-1's API_BASE_URL comment - the load balancer's URL, not this node's own port.
      - API_BASE_URL=http://localhost:8080
      - CONSOLE_BASE_URL=http://localhost:3000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-alarik}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-alarik}
      - JWT=dev-cluster-jwt-secret
      - CLUSTER_NODE_ADDRESS=http://alarik-2:8080
      - CLUSTER_SECRET=dev-cluster-secret
      - CLUSTER_SEED_NODES=http://alarik-1:8080
      # Erasure coding sized for this 4-node dev cluster: k=2 data + m=2 parity shards (one shard
      # per node). The default is 4+2, which needs 6 nodes and would fail every write here - a
      # cluster must have at least k+m active nodes to accept writes. Tolerates losing any 2 nodes.
      - CLUSTER_EC_DATA_SHARDS=2
      - CLUSTER_EC_PARITY_SHARDS=2
      - DEFAULT_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
      - DEFAULT_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    volumes:
      - ./alarik:/app
      - alarik-build:/app/.build:ro
      - alarik-2-storage:/app/Storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      alarik-build:
        condition: service_completed_successfully
      alarik-1:
        condition: service_healthy
    networks:
      - alarik-network

  alarik-3:
    image: alarik-cluster-dev:latest
    container_name: alarik-cluster-dev-3
    restart: unless-stopped
    command: [".build/debug/Alarik", "serve", "--env", "development", "--hostname", "0.0.0.0", "--port", "8080"]
    ports:
      - "8083:8080"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # See alarik-1's API_BASE_URL comment - the load balancer's URL, not this node's own port.
      - API_BASE_URL=http://localhost:8080
      - CONSOLE_BASE_URL=http://localhost:3000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-alarik}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-alarik}
      - JWT=dev-cluster-jwt-secret
      - CLUSTER_NODE_ADDRESS=http://alarik-3:8080
      - CLUSTER_SECRET=dev-cluster-secret
      - CLUSTER_SEED_NODES=http://alarik-1:8080
      # Erasure coding sized for this 4-node dev cluster: k=2 data + m=2 parity shards (one shard
      # per node). The default is 4+2, which needs 6 nodes and would fail every write here - a
      # cluster must have at least k+m active nodes to accept writes. Tolerates losing any 2 nodes.
      - CLUSTER_EC_DATA_SHARDS=2
      - CLUSTER_EC_PARITY_SHARDS=2
      - DEFAULT_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
      - DEFAULT_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    volumes:
      - ./alarik:/app
      - alarik-build:/app/.build:ro
      - alarik-3-storage:/app/Storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      alarik-build:
        condition: service_completed_successfully
      alarik-1:
        condition: service_healthy
    networks:
      - alarik-network

  alarik-4:
    image: alarik-cluster-dev:latest
    container_name: alarik-cluster-dev-4
    restart: unless-stopped
    command: [".build/debug/Alarik", "serve", "--env", "development", "--hostname", "0.0.0.0", "--port", "8080"]
    ports:
      - "8084:8080"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # See alarik-1's API_BASE_URL comment - the load balancer's URL, not this node's own port.
      - API_BASE_URL=http://localhost:8080
      - CONSOLE_BASE_URL=http://localhost:3000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-alarik}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-alarik}
      - JWT=dev-cluster-jwt-secret
      - CLUSTER_NODE_ADDRESS=http://alarik-4:8080
      - CLUSTER_SECRET=dev-cluster-secret
      - CLUSTER_SEED_NODES=http://alarik-1:8080
      # Erasure coding sized for this 4-node dev cluster: k=2 data + m=2 parity shards (one shard
      # per node). The default is 4+2, which needs 6 nodes and would fail every write here - a
      # cluster must have at least k+m active nodes to accept writes. Tolerates losing any 2 nodes.
      - CLUSTER_EC_DATA_SHARDS=2
      - CLUSTER_EC_PARITY_SHARDS=2
      - DEFAULT_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
      - DEFAULT_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
    volumes:
      - ./alarik:/app
      - alarik-build:/app/.build:ro
      - alarik-4-storage:/app/Storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    depends_on:
      alarik-build:
        condition: service_completed_successfully
      alarik-1:
        condition: service_healthy
    networks:
      - alarik-network

  # Round-robins across all four nodes (nginx/cluster.dev.conf) - the console, aws-cli, or any
  # other S3 client pointed at this one URL actually exercises cross-node routing/forwarding
  # instead of always landing on the same node, the same as a real load balancer in front of a
  # production cluster. Any node can serve any request, so there's no "primary" to pick.
  lb:
    image: nginx:alpine
    container_name: alarik-cluster-dev-lb
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/cluster.dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # nginx:alpine's busybox ash doesn't support /dev/tcp redirection (unlike the bash used by
      # every alarik-N healthcheck) - curl is available on the image instead. Deliberately no
      # -f/--fail: any response at all (even a non-2xx from whichever backend nginx proxied to)
      # means nginx itself is up and can reach the cluster, which is all this needs to confirm.
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://127.0.0.1/"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s
    depends_on:
      alarik-1:
        condition: service_healthy
      alarik-2:
        condition: service_healthy
      alarik-3:
        condition: service_healthy
      alarik-4:
        condition: service_healthy
    networks:
      - alarik-network

  console:
    build:
      context: ./console
      dockerfile: Dockerfile.dev
    container_name: console-cluster-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "24678:24678" # Nuxt dev server HMR
    environment:
      - NODE_ENV=development
      # Nuxt's runtimeConfig.public only auto-reads env vars with the NUXT_PUBLIC_ prefix (see
      # console/nuxt.config.ts) - a bare API_BASE_URL is silently ignored and the console falls
      # back to its hardcoded default (localhost:8080). Points at the load balancer, not any one
      # node directly, so the console's own traffic distributes across the cluster too.
      - NUXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - NUXT_PUBLIC_CONSOLE_BASE_URL=http://localhost:3000
    volumes:
      - ./console:/app
      - /app/node_modules
      - /app/.nuxt
    depends_on:
      lb:
        condition: service_healthy
    networks:
      - alarik-network

networks:
  alarik-network:
    driver: bridge

volumes:
  alarik-build:
  alarik-1-storage:
  alarik-2-storage:
  alarik-3-storage:
  alarik-4-storage:
