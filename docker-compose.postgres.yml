services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=alarik
      - POSTGRES_PASSWORD=YOUR_SECURE_DB_PASSWORD
      - POSTGRES_DB=alarik
    volumes:
      - alarik-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alarik"]
      interval: 5s
      timeout: 5s
      retries: 5

  alarik:
    image: ghcr.io/achtungsoftware/alarik:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - API_BASE_URL=http://localhost:8080
      - CONSOLE_BASE_URL=http://localhost:3000
      - ADMIN_USERNAME=alarik
      - ADMIN_PASSWORD=alarik
      - JWT=YOUR_SECURE_JWT_KEY
      - ALLOW_ACCOUNT_CREATION=false
      # Opts this node into Postgres for its control-plane metadata (users, buckets, access
      # keys, policies, webhook/replication config) instead of the zero-config SQLite default -
      # required, not just supported, once you run more than one Alarik node sharing this data.
      # Object bytes still live on each node's own Storage volume
      - DATABASE_URL=postgres://alarik:YOUR_SECURE_DB_PASSWORD@postgres:5432/alarik
    volumes:
      - alarik-storage:/app/Storage
    depends_on:
      postgres:
        condition: service_healthy

  console:
    image: ghcr.io/achtungsoftware/alarik-console:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - NUXT_PUBLIC_CONSOLE_BASE_URL=http://localhost:3000
      - NUXT_PUBLIC_ALLOW_ACCOUNT_CREATION=false
    depends_on:
      - alarik

volumes:
  alarik-storage:
  alarik-postgres:
